version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - app-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/usersdb
      - JWT_SECRET=supersecretkey123
      - ADMIN_EMAILS=admin@example.com
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "3002:3002"
    volumes:
      - ./proto:/proto:ro
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/productsdb
      - JWT_SECRET=supersecretkey123
      - INVENTORY_SERVICE_HOST=inventory-service
      - INVENTORY_SERVICE_PORT=3004
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "3004:3004"
    volumes:
      - ./proto:/proto:ro
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://mongodb:27017/inventorydb
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "3005:3005"
    volumes:
      - ./proto:/proto:ro
    environment:
      - PORT=3005
      - MONGODB_URI=mongodb://mongodb:27017/paymentsdb
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "3003:3003"
    volumes:
      - ./proto:/proto:ro
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/ordersdb
      - INVENTORY_SERVICE_HOST=inventory-service
      - INVENTORY_SERVICE_PORT=3004
      - PAYMENT_SERVICE_HOST=payment-service
      - PAYMENT_SERVICE_PORT=3005
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
